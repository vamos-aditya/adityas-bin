<!DOCTYPE html>
<html>
<head>
    <title>TempShare</title>
    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 30px;
            border: 1px solid #333;
            border-radius: 10px;
        }

        input {
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #2979ff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        a {
            color: #00e676;
            display: block;
            margin-top: 15px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TempShare</h2>

    <input type="file" id="file">
    <br>
    <button onclick="uploadFile()">Upload</button>

    <a id="link"></a>
</div>

<script>
async function uploadFile() {
    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    if (!file) return alert("Select a file");

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("http://localhost:5000/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    const link = document.getElementById("link");
    link.href = data.shareLink;
    link.innerText = "Share Link: " + data.shareLink;
}
</script>

</body>
</html>

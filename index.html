<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aditya's Bin</title>

<link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Alegreya', serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* 🎬 VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  pointer-events: none;
}

/* 🌑 DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  top: 0;
  left: 0;
  z-index: -1;
}

/* 📦 MAIN CONTAINER */
.container {
  position: relative;
  z-index: 2;
  background: rgba(20,20,30,0.78);
  backdrop-filter: blur(14px);
  padding: 35px;
  border-radius: 20px;
  width: 400px;
  text-align: center;
  box-shadow: 0 10px 45px rgba(0,0,0,0.65);
  color: white;
}

/* FILE PICKER */
.file-label {
  display: inline-block;
  padding: 12px 22px;
  background: white;
  color: black;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
  font-weight: bold;
}

.file-label input {
  display: none;
}

#fileName {
  font-size: 15px;
  color: #ccc;
  margin-bottom: 15px;
}

/* UPLOAD BUTTON */
button.upload {
  background: #4CAF50;
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  font-family: 'Alegreya', serif;
}

/* PROGRESS BAR */
.progress-container {
  width: 100%;
  background: #333;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: #00ffcc;
  border-radius: 10px;
}

/* UPLOAD STATUS */
.uploaded-msg {
  color: #ff1744;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 0 0 10px #ff1744;
}

/* DOWNLOAD BUTTON */
#downloadBtn {
  background: #00ffcc;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Alegreya', serif;
  font-weight: bold;
  box-shadow: 0 0 15px #00ffcc;
  margin-top: 10px;
}

/* COPY PROMPT */
#copyPrompt {
  color: #38bdf8;
  margin-top: 8px;
  font-size: 14px;
  font-weight: bold;
}

/* INFO BUTTON */
#infoBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #38bdf8;
  color: white;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 0 20px #38bdf8;
  z-index: 1000;
}

/* INFO BOX */
#infoBox {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 300px;
  background: rgba(20,20,30,0.95);
  color: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  z-index: 1000;
  font-size: 14px;
  line-height: 1.6;
}

/* MOBILE */
@media (max-width: 768px) {
  #bgVideo {
    display: none;
  }

  body {
    background: url("./bg.jpg") no-repeat center/cover;
  }

  .container {
    width: 90%;
  }

  #infoBox {
    width: 80%;
    right: 10%;
  }
}
</style>
</head>

<body>

<!-- 🎬 CHANGE THIS FILE NAME TO YOUR NEW VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="newbg.mp4" type="video/mp4">
</video>

<div class="container">
  <h2>🗂️ Aditya's Bin</h2>

  <form id="uploadForm">
    <label class="file-label">
      Choose File
      <input type="file" name="file" id="fileInput" required />
    </label>

    <p id="fileName">No file chosen</p>

    <button class="upload" type="submit">Upload</button>
  </form>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="link"></p>
</div>

<!-- INFO BUTTON -->
<button id="infoBtn">?</button>

<!-- INFO BOX -->
<div id="infoBox">
  <strong>How TempShare Works:</strong><br><br>
  Upload your file securely and generate a private temporary link.<br><br>
  Share that link with anyone.<br><br>
  The file can only be opened once, after which it is permanently deleted from the server.<br><br>
  This ensures secure, temporary, one-time file sharing.
</div>

<script>
const video = document.getElementById("bgVideo");
video.play().catch(() => {});

/* FILE UPLOAD */
const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const linkBox = document.getElementById("link");

fileInput.onchange = () => {
  fileName.innerText = fileInput.files[0]
    ? fileInput.files[0].name
    : "No file chosen";
};

form.onsubmit = (e) => {
  e.preventDefault();

  const data = new FormData(form);
  const xhr = new XMLHttpRequest();

  progressContainer.style.display = "block";
  progressBar.style.width = "0%";

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      progressBar.style.width = (e.loaded / e.total) * 100 + "%";
    }
  };

  xhr.onload = () => {
    const res = JSON.parse(xhr.responseText);

    linkBox.innerHTML = `
      <p class="uploaded-msg">🎉 Uploaded!</p>
      <button id="downloadBtn">⬇ Download</button>
      <p id="copyPrompt"></p>
    `;

    document.getElementById("downloadBtn").onclick = async () => {
      await navigator.clipboard.writeText(res.link);

      document.getElementById("copyPrompt").innerText =
        "✅ Link copied to clipboard";

      fileInput.value = "";
      fileName.innerText = "No file chosen";
      progressContainer.style.display = "none";
      progressBar.style.width = "0%";
    };
  };

  xhr.open("POST", "/upload");
  xhr.send(data);
};

/* INFO TOGGLE */
const infoBtn = document.getElementById("infoBtn");
const infoBox = document.getElementById("infoBox");

infoBtn.onclick = () => {
  infoBox.style.display =
    infoBox.style.display === "block" ? "none" : "block";
};
</script>

</body>
</html>

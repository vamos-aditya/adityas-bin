<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aditya's Bin</title>

<link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Alegreya', serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* 🎬 VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* 🌑 OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* 📦 MAIN BOX */
.container {
  position: relative;
  z-index: 1;
  background: rgba(20,20,30,0.7);
  backdrop-filter: blur(12px);
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  color: white;
}

/* 🎵 MUSIC BUTTON */
#musicBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #38bdf8;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px #38bdf8;
  font-family: 'Alegreya', serif;
}

/* ▶ YOUTUBE BUTTON (TOP LEFT) */
#ytBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 999;
  background: #ff0000;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-family: 'Alegreya', serif;
  box-shadow: 0 0 15px #ff0000;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* file button */
.file-label {
  display: inline-block;
  padding: 10px 20px;
  background: #ffffff;
  color: #000;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
}

.file-label input {
  display: none;
}

#fileName {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 15px;
}

/* upload button */
button.upload {
  background: #4CAF50;
  border: none;
  padding: 10px 18px;
  margin: 5px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* progress */
.progress-container {
  width: 100%;
  background: #333;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: #00ffcc;
  border-radius: 10px;
}

/* uploaded text */
.uploaded-msg {
  color: #ff1744;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 0 0 10px #ff1744;
}

/* 🔴 GLOW */
.glow {
  animation: glowPulse 1.5s ease-in-out 2;
  box-shadow: 0 0 20px #ff1744, 0 0 40px #ff1744;
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 0px #ff1744; }
  50% { box-shadow: 0 0 35px #ff1744, 0 0 70px #ff1744; }
  100% { box-shadow: 0 0 0px #ff1744; }
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  #bgVideo {
    display: none;
  }

  body {
    background: url("./bg.jpg") no-repeat center/cover;
  }
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- 🎵 BUTTONS -->
<button id="musicBtn">🎵 Resume Music</button>

<button id="ytBtn">
  <svg height="18" width="18" viewBox="0 0 24 24" fill="white">
    <path d="M10 15l5.19-3L10 9v6zm11-3c0 5-1 6-8 6s-8-1-8-6 1-6 8-6 8 1 8 6z"/>
  </svg>
  YouTube
</button>

<div class="container" id="mainBox">
  <h2>🗂️ Aditya's Bin</h2>

  <form id="uploadForm">
    
    <label class="file-label">
      Choose File
      <input type="file" name="file" id="fileInput" required />
    </label>

    <p id="fileName">No file chosen</p>

    <button class="upload" type="submit">Upload</button>
  </form>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="link"></p>
</div>

<script>
/* ▶ YOUTUBE */
const ytBtn = document.getElementById("ytBtn");
const ytLink = "https://www.youtube.com/watch?v=teERz_qPtzY";

ytBtn.addEventListener("click", () => {
  window.open(ytLink, "_blank");
});

/* 🎵 MUSIC */
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

music.muted = true;
music.play().catch(() => {});

let isMuted = true;

musicBtn.addEventListener("click", () => {
  if (isMuted) {
    music.muted = false;
    music.play();
    musicBtn.innerText = "🔇 Mute Music";
    isMuted = false;
  } else {
    music.muted = true;
    musicBtn.innerText = "🎵 Resume Music";
    isMuted = true;
  }
});

/* UPLOAD FIXED (IMPORTANT CHANGE HERE) */
const form = document.getElementById("uploadForm");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const box = document.getElementById("mainBox");

fileInput.addEventListener("change", () => {
  fileName.textContent = fileInput.files[0]
    ? fileInput.files[0].name
    : "No file chosen";
});

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(form);
  const xhr = new XMLHttpRequest();

  progressContainer.style.display = "block";

  xhr.upload.addEventListener("progress", (e) => {
    if (e.lengthComputable) {
      let percent = (e.loaded / e.total) * 100;
      progressBar.style.width = percent + "%";
    }
  });

  xhr.onload = function() {
    const data = JSON.parse(xhr.responseText);

    document.getElementById("link").innerHTML =
      `<p class="uploaded-msg">🎉 Uploaded!</p>
       <a href="${data.link}" target="_blank">${data.link}</a>`;

    box.classList.add("glow");
    setTimeout(() => box.classList.remove("glow"), 3000);
  };

  /* ✅ FIX: works on Render + local */
  xhr.open("POST", "/upload");
  xhr.send(formData);
});
</script>

</body>
</html>
